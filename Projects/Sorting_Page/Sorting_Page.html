<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Sorting Visualizer — Jordan Mielke</title>
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary-fixed-dim":         "#00daf3",
            "primary-fixed":             "#9cf0ff",
            "primary-container":         "#00e5ff",
            "primary":                   "#c3f5ff",
            "secondary-container":       "#00818d",
            "secondary":                 "#75d5e2",
            "secondary-fixed":           "#92f1fe",
            "tertiary":                  "#9affec",
            "surface-container-lowest":  "#060e20",
            "surface-container-low":     "#131b2e",
            "surface-container":         "#171f33",
            "surface-container-high":    "#222a3d",
            "surface-container-highest": "#2d3449",
            "surface-variant":           "#2d3449",
            "surface":                   "#0b1326",
            "background":                "#0b1326",
            "on-background":             "#dae2fd",
            "on-surface":                "#dae2fd",
            "on-surface-variant":        "#bac9cc",
            "on-primary":                "#00363d",
            "on-secondary-container":    "#f6feff",
            "outline":                   "#849396",
            "outline-variant":           "#3b494c",
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px",
          },
          fontFamily: {
            headline: ["Space Grotesk"],
            body:     ["Inter"],
            label:    ["Inter"],
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
    .neural-glass {
      background: rgba(45,52,73,0.3);
      backdrop-filter: blur(12px);
      outline: 1px solid rgba(195,245,255,0.12);
    }
    .neural-gradient { background: linear-gradient(135deg, #c3f5ff 0%, #00e5ff 100%); }
    input[type='range'] { -webkit-appearance: none; background: transparent; width: 100%; }
    input[type='range']::-webkit-slider-runnable-track { background: #171f33; height: 4px; border-radius: 999px; }
    input[type='range']::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 16px; width: 16px;
      border-radius: 50%;
      background: #00daf3;
      margin-top: -6px;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0,218,243,0.5);
    }
    select {
      -webkit-appearance: none;
      background-image: none;
    }
    /* Bar colors */
    .bar          { background: rgba(0,218,243,0.4); border-radius: 2px 2px 0 0; box-shadow: 0 0 8px rgba(0,218,243,0.15); transition: height 0.05s linear; }
    .bar.comparing{ background: #c3f5ff; box-shadow: 0 0 20px rgba(195,245,255,0.5); }
    .bar.pivot    { background: #9affec; box-shadow: 0 0 20px rgba(154,255,236,0.5); }
    .bar.sorted   { background: #00818d; box-shadow: 0 0 12px rgba(0,129,141,0.4); }
    #bars_container { display: flex; align-items: flex-end; gap: 2px; width: 100%; height: 100%; }
    #bars_container .bar { flex: 1; min-width: 2px; }
  </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col overflow-hidden">

  <!-- Top Nav -->
  <nav class="fixed top-0 w-full z-50 bg-[#0b1326]/80 backdrop-blur-xl border-b border-[#00daf3]/10 shadow-[0_0_20px_rgba(0,229,255,0.05)]">
    <div class="flex justify-between items-center px-8 py-4 max-w-full mx-auto">
      <div class="flex items-center gap-4">
        <a href="../../index.html" class="text-2xl font-bold tracking-tighter text-[#c3f5ff] font-headline hover:text-[#00daf3] transition-colors">Jordan Mielke - Portfolio Website</a>
        <div class="h-6 w-px bg-outline-variant mx-1"></div>
        <span class="text-sm font-medium tracking-widest text-primary-fixed-dim uppercase hidden sm:block">Sorting Visualizer</span>
      </div>
      <div class="hidden md:flex items-center gap-8 font-headline tracking-tight">
        <a href="../../index.html"    class="text-slate-400 hover:text-[#c3f5ff] transition-colors">Home</a>
        <a href="../../About.html"    class="text-slate-400 hover:text-[#c3f5ff] transition-colors">Skills</a>
        <a href="../../Projects.html" class="text-[#00daf3] border-b-2 border-[#00daf3] pb-1 transition-all">Projects</a>
      </div>
    </div>
  </nav>

  <!-- Main canvas -->
  <main class="flex-grow pt-[72px] pb-4 px-6 grid grid-cols-1 md:grid-cols-12 gap-6 overflow-hidden" style="height:100vh;">

    <!-- Sidebar control panel -->
    <aside class="md:col-span-3 flex flex-col gap-4 overflow-y-auto py-4">
      <div class="neural-glass p-6 rounded-xl flex flex-col gap-6 h-full">

        <header>
          <h2 class="text-primary-fixed-dim text-2xl font-bold uppercase tracking-[0.2em] mb-1 block">Controller</h2>
        </header>

        <!-- Algorithm select -->
        <div class="space-y-2">
          <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider">Select Architecture</label>
          <div class="relative">
            <select id="algo" class="w-full bg-surface-container-lowest text-on-surface rounded-lg py-3 px-4 focus:ring-2 focus:ring-primary-fixed-dim/30 transition-all font-medium border border-outline-variant/30 cursor-pointer">
              <option value="bubble">Bubble Sort</option>
              <option value="merge">Merge Sort</option>
              <option value="quick">Quick Sort</option>
              <option value="heap">Heap Sort</option>
            </select>
            <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-outline text-lg">expand_more</span>
          </div>
        </div>

        <!-- Array length slider -->
        <div class="space-y-3">
          <div class="flex justify-between items-center">
            <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider">Array Length</label>
            <span class="text-primary-fixed-dim font-mono text-sm" id="slider-val">80 pts</span>
          </div>
          <input type="range" id="slider" min="10" max="200" step="5" value="80"/>
        </div>

        <!-- Speed slider -->
        <div class="space-y-3">
          <div class="flex justify-between items-center">
            <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider">Processing Speed</label>
            <span class="text-primary-fixed-dim font-mono text-sm" id="slider2-val">50ms</span>
          </div>
          <input type="range" id="slider2" min="1" max="200" step="1" value="50"/>
        </div>

        <!-- Algorithm info -->
        <div class="bg-surface-container-lowest rounded-lg p-4 border border-outline-variant/20">
          <p class="text-[10px] font-bold uppercase tracking-widest text-outline mb-1">Complexity</p>
          <p class="text-sm text-primary-fixed-dim font-mono" id="complexity-label">O(n²) avg</p>
        </div>

        <!-- Action buttons -->
        <div class="mt-auto space-y-3">
          <button id="sort_btn" class="w-full neural-gradient text-on-primary font-bold py-4 rounded-full flex items-center justify-center gap-2 hover:brightness-110 active:scale-[0.98] transition-all shadow-[0_0_20px_rgba(0,229,255,0.2)]">
            <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">play_arrow</span>
            START ARCHITECT
          </button>
          <button id="randomize_array_btn" class="w-full border border-outline-variant hover:bg-white/5 text-primary-fixed-dim font-bold py-4 rounded-full flex items-center justify-center gap-2 active:scale-[0.98] transition-all">
            <span class="material-symbols-outlined">shuffle</span>
            RANDOMIZE
          </button>
        </div>

      </div>
    </aside>

    <!-- Visualization area -->
    <section class="md:col-span-9 flex flex-col gap-4 py-4 overflow-hidden">

      <!-- Canvas -->
      <div class="flex-grow neural-glass rounded-xl p-6 flex items-end relative overflow-hidden">
        <!-- Background ambient -->
        <div class="absolute inset-0 opacity-5 pointer-events-none">
          <div class="absolute top-10 left-10 w-64 h-64 bg-primary rounded-full blur-[120px]"></div>
          <div class="absolute bottom-10 right-10 w-96 h-96 bg-secondary-container rounded-full blur-[150px]"></div>
        </div>
        <!-- Status badge -->
        <div class="absolute top-5 left-5 flex items-center gap-3 z-10">
          <div class="flex items-center gap-2 bg-surface-container-high/60 px-3 py-1.5 rounded-full border border-outline-variant/30 backdrop-blur-md">
            <span id="status-dot" class="w-2 h-2 rounded-full bg-outline"></span>
            <span class="text-[10px] font-bold tracking-widest uppercase" id="status-text">State: Idle</span>
          </div>
          <div id="algo-label" class="text-[10px] font-medium text-on-surface-variant uppercase tracking-widest bg-white/5 px-3 py-1.5 rounded-full border border-white/5">
            Bubble Sort
          </div>
        </div>
        <!-- Bars container -->
        <div id="bars_container" class="relative z-0 w-full h-full"></div>
      </div>

      <!-- Metrics bar -->
      <div class="grid grid-cols-3 gap-4 h-24 shrink-0">
        <div class="neural-glass rounded-xl flex items-center px-6 gap-5 border-l-4 border-primary-fixed-dim">
          <div class="p-2.5 bg-primary/10 rounded-lg shrink-0">
            <span class="material-symbols-outlined text-primary-fixed-dim">swap_horiz</span>
          </div>
          <div>
            <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Swaps</p>
            <p class="text-2xl font-headline font-bold text-primary-fixed-dim" id="swaps-count">0</p>
          </div>
        </div>
        <div class="neural-glass rounded-xl flex items-center px-6 gap-5">
          <div class="p-2.5 bg-secondary/10 rounded-lg shrink-0">
            <span class="material-symbols-outlined text-secondary">timer</span>
          </div>
          <div>
            <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Time</p>
            <p class="text-2xl font-headline font-bold text-on-surface font-mono" id="time-display">00:00</p>
          </div>
        </div>
        <div class="neural-glass rounded-xl flex items-center px-6 gap-5">
          <div class="p-2.5 bg-tertiary/10 rounded-lg shrink-0">
            <span class="material-symbols-outlined text-tertiary">fact_check</span>
          </div>
          <div>
            <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Comparisons</p>
            <p class="text-2xl font-headline font-bold text-on-surface" id="checks-count">0</p>
          </div>
        </div>
      </div>

    </section>

  </main>

  <!-- Footer -->
  <footer class="bg-[#060e20] w-full py-5 px-8 flex flex-col md:flex-row justify-between items-center gap-4 shrink-0">
    <div class="text-base font-black text-[#c3f5ff] uppercase tracking-widest font-headline">NEURAL ARCHITECT</div>
    <div class="flex gap-8 font-body text-sm">
      <a href="../../index.html"    class="text-slate-500 hover:text-[#00daf3] transition-colors">Home</a>
      <a href="../../Projects.html" class="text-slate-500 hover:text-[#00daf3] transition-colors">Projects</a>
    </div>
    <p class="text-slate-500 uppercase text-[10px] font-bold tracking-widest">© 2024 NEURAL ARCHITECT AGENCY</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
